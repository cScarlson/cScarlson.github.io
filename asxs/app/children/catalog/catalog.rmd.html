
<body>

            <iframe src="/asxs/v2.0.0/button/stateful/docs/docs.rmd.html" is="as-frameless"></iframe>
            <iframe src="/asxs/v2.0.0/icon/docs/docs.rmd.html" is="as-frameless"></iframe>

    <style>
        at-catalog {
            --color-txt: var(--indigo-3);
            display: block;
            
            .catalog.header {
                position: sticky;
                top: var(--header-height);
                display: flex;
                align-items: center;
                justify-content: space-between;
                height: var(--header-height);
                box-shadow: var(--shadow-4);
                padding-inline: var(--offset);
                background-color: var(--gray-8);
                color: var(--color-txt);
                z-index: 9;
                
                .header.branding {
                    margin: 0;
                    
                    .branding.title {}
                    
                    .branding.subtitle {
                        font-size: var(--font-size-1);
                        font-weight: var(--font-weight-3);
                    }
                    
                }
                
                .header.menu {
                    display: flex;
                    margin: 0;
                    
                    .menu.icon {
                        --color: var(--color-txt);
                    }
                    
                    .menu.list {
                        min-width: var(--size-px-13);
                        margin: 0;
                        border-radius: var(--radius-2);
                        padding: var(--size-2);
                        
                        .list.item {
                            list-style-type: none;
                            
                            .item.action {
                                text-decoration: none;

                        }
                    }
                    
                }
                
            }
            
            .catalog.body {
                padding-block: var(--size-5);
                
                .catalog.docs {
                    display: block;
                    padding-inline: var(--offset);
                    
                    pre {
                        display: block;
                        padding: var(--size-3);
                        overflow: auto;
                        background-color: var(--gray-8);
                        color: var(--color-primary);
                        code {}
                    }
                    
                }
                
            }
            
            .catalog.footer {}
            
        }
    </style>
    <script type="module">
        import { CustomElement } from '/asxs/v2.0.0/core/element/element.js';
        import { customElement } from '/asxs/v2.0.0/core/element/custom.js';
        import { TemplateCrawler } from '/asxs/v2.0.0/core/element/template.crawler.js';
        import { default as data } from './content.json' with { type: 'json' };
        
        customElement('at-catalog')
        (class CatalogElement extends CustomElement {
            data = data;
            ['crawler:template'] = new TemplateCrawler(this);
            
            stabilize() {
                this.idle();
            }
            
            createRenderRoot() {
                return this;
            }
            
        });
    </script>
    <script type="module">
        import { customElement } from '/asxs/v2.0.0/core/element/custom.js';
        import { root } from '/asxs/v2.0.0/core/element/window.js';
        import { default as data } from './content.json' with { type: 'json' };
        
        const { HTMLSpanElement } = root;
        const $data = data.reduce( ($, o) => $.set(o.id, o), new Map() )
            .set('/catalog', { id: '/catalog', title: 'Variables' })
            ;
        
        customElement('at-catalog-title', { extends: 'span' })
        (class CatalogTitleElement extends HTMLSpanElement {
            
            handleEvent(e) {
                const { newURL } = e;
                const { hash } = new URL(newURL);
                const entry = ( (path) => $data.get(path) )( hash.replace('#', '') );
                const get = ({ title } = { title: 404 }) => title;
                
                this.innerHTML = get(entry);
            }
            
            connectedCallback() {
                root.addEventListener('hashchange', this, true);
            }
            
            disconnectedCallback() {
                root.removeEventListener('hashchange', this, true);
            }
            
        });
    </script>
</body>
