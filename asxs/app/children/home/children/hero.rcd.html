    <script type="module">
        import { CustomElement } from '/asxs/v2.0.0/core/element/element.js';
        import { customElement, customElements } from '/asxs/v2.0.0/core/element/custom.js';
        import { root } from '/asxs/v2.0.0/core/element/window.js';
        
        const { frameElement } = window;
        const { setTimeout, console } = root;
        const { log } = console;
        const timeout = setTimeout.bind(root);
        
        customElement('at-home-hero')
        (class HomeHeroElement extends CustomElement {
            DELAY = (1000 * 1);
            wrapper = document.createElement('error');
            
            #cycle = timeout.bind(root, (targets, target, ...more) => {
                if (this.wrapper.matches(':hover')) return this.#cycle(targets, target, ...more);
                if (!target) return this.#cycle(targets, ...targets);
                const { log } = console;
                
                target.checked = true;
                log(`#cycle`, target);
                this.#cycle(targets, ...more);
            }, this.DELAY);
            
            init() {
                const { log } = console;
                const { root } = this;
                const wrapper = root.querySelector('.section.article .article.hero');
                const targets = root.querySelectorAll('.section.article .article.target.content');
                
                this.wrapper = wrapper;
                this.#cycle(targets, ...targets);
            };
            
            createRenderRoot() {
                return this;
            }
            
            stabilize() {}  // retain iframe's window scope. todo: eliminate this need!
            
            connectedCallback( x = super.connectedCallback() ) {
                this.init();
            }
            
        });
    </script>
