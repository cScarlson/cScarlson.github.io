
<body>
    <meta name="partial" />
    <template>
        <at-home-typescript id="/typescript">
            <div class="section article typescript">
                <header class="article header">
                    <h1>As a TypeScript Framework</h1>

                </header>
                <div class="article body">
                    <p>

                        maybe you will write a frontend TS compiler that looks like this!...
                    </p>
                    <pre class="body example"><code class="example code">${prompt}</code></pre>
                </div>
                <footer class="article footer"></footer>
            </div>
            <footer class="section footer">
                <div class="footer content">
                    <p>
                        AsXS is working on this but has not come out with a stable, performant version for a frontend compiler (yet). 
                        We hope you beat us to it!
                    </p>
                </div>
            </footer>
        </at-home-typescript>
    </template>
    <style>
        at-home-typescript {
            display: block;
            margin-block: var(--size-px-10);
            
            .section.header, .section.article, .section.footer {
                padding-inline: var(--offset);
            }
                
            .section.header {}
            
            .section.article.typescript {
                box-shadow: var(--body-section-shadow);
                padding-block: var(--size-px-5);
                background-color: var(--gray-1);
                color: var(--blue-8);
                
                .article.body {
                    
                    .body.example {
                        /* border: solid 1px tomato; */
                        padding: var(--size-px-3) var(--size-px-4);
                        background-color: var(--gray-8);
                        color: var(--gray-1);
                        overflow: auto;
                        scrollbar-width: none;
                        
                        .example.code {
                            /* border: solid 1px tomato; */
                        }
                        
                    }
                    
                }
                
            }
            
            .section.footer {
                min-height: 50dvh;
                .footer.content {
                    .content.title {
                        color: var(--blue-8);
                    }
                }
            }
            
        }
    </style>
    <script type="application/json">
        {
            "prompt": "&lt;script type=\"text/typescript\" is=\"as-typescript\"&gt;&lt;/script&gt;"
        }
    </script>
    <script type="module">
        import { utilities } from '/asxs/v2.0.0/core/utilities/utilities.js';
        
        const { frameElement } = window;
        const template = document.querySelector('template');
        const style = document.querySelector('style');
        const scope = document.querySelector('script[type="application/json"]');
        const data = JSON.parse(scope.innerHTML);
        
        template.innerHTML = utilities.interpolate(template.innerHTML)(data);
        template.content.firstElementChild.appendChild(style);
        frameElement.replaceWith(template.content);
    </script>
