
<body>

        <article class="static partial">

        </article>

        .static.partial {
            color: darkcyan;

        }

    <script type="application/json">
        {
            "name": "Avery Juan",
            "nouns": "lawyers"
        }

    <script>
        const { log } = console;
        const template = document.querySelector('#template');

        h1.innerHTML += '!';
        log(`@STATIC/PARTIAL`, template, article);
