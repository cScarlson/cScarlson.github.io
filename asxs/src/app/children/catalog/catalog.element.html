
<div class="app catalog">
    <footer class="catalog footer"></footer>
    <div class="catalog body" data-active="#/catalog/section/icons">
        <div class="body content">
            ${documentation}
            <hr />
            <style is="as-css-import" target="buttons"></style>
            <style is="as-css-import" target="tooltip"></style>
            <button is="as-button">
                [position="block-start"]
                <as-tooltip position="block-start">
                    <h1>Some Tooltip</h1>
                    <p>This is a really big tooltip.</p>
                </as-tooltip>
            </button>
            <button is="as-button">
                [position="block-end"]
                <as-tooltip position="block-end">
                    <h1>Some Tooltip</h1>
                    <p>This is a really big tooltip.</p>
                </as-tooltip>
            </button>
            <button is="as-button">
                [position="inline-start"]
                <as-tooltip position="inline-start">
                    <h1>Some Tooltip</h1>
                    <p>This is a really big tooltip.</p>
                </as-tooltip>
            </button>
            <button is="as-button">
                [position="inline-end"]
                <as-tooltip position="inline-end">
                    <h1>Some Tooltip</h1>
                    <p>This is a really big tooltip.</p>
                </as-tooltip>
            </button>
            <button is="as-button">
                :not([position])
                <as-tooltip>
                    <h1>Some Tooltip</h1>
                    <p>This is a really big tooltip.</p>
                </as-tooltip>
            </button>
        </div>
    </div>
    <header class="catalog header">
        <div class="header main">
            <h1 class="main title">Catalog</h1>
            <menu class="main menu">
                <li class="menu item"><label class="item control" for="variables">Variables</label></li>
                <li class="menu item"><label class="item control" for="icons">Icons</label></li>
                <li class="menu item"><label class="item control" for="buttons">Buttons</label></li>
                <li class="menu item"><label class="item control" for="tooltips">Tooltips</label></li>
                <li class="menu item"><label class="item control" for="popovers">Popovers</label></li>
                <li class="menu item"><label class="item control" for="more">More</label></li>
            </menu>
        </div>
        <div class="header alert">
            <p class="alert caption">
                All examples are "Breathing Documentation" so that any changes to the code example get reflected in the rendered output.
            </p>
        </div>
    </header>
</div>
