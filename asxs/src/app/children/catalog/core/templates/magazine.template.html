
<div class="content section wrapper">
    <input id="${id}" class="content section control" name="tab" type="radio" data-(change)="menu:item" data-[query]="${id}" />
    <as-catagory class="content section article">
        <h2 slot="title">${title}</h2>
        <h3 slot="subtitle">
            <pre><code>${subtitle}</code></pre>
        </h3>
        <h4 slot="tagline">${tagline}</h4>
        <p class="section description" slot="content">${description}</p>
        ${children}
    </as-catagory>
</div>
