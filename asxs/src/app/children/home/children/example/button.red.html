
<body>
    <meta name="partial" />
    <template>
        <div class="section article hook">
            <header class="article header">
                <h1>As Simple As It Gets</h1>
                <h2>Button is as button does... literally.</h2>
            </header>
            <div class="article body">
                <pre class="body example"><code class="example code">${button}</code></pre>
            </div>
            <footer class="article footer"></footer>
        </div>
        <footer class="section footer">
            <p class="footer content">
                You can use AsXS as just a pure CSS SDK with your own stylistic overrides or you can define a Custom Element 
                for it to bootstrap your own behavior. Have a look at the 
                <a class="content link more" href="#/catalog">Component Catalog</a> to learn more.
            </p>
        </footer>
    </template>
    <style>
        .body.section.hook {
            display: block;
                
            .section.header {}
            
            .section.article.hook {
                box-shadow: var(--body-section-shadow);
                padding-block: var(--size-px-5);
                background-color: var(--gray-1);
                color: var(--blue-7);
                
                .article.body {
                    
                    .body.example {
                        /* border: solid 1px tomato; */
                        padding: var(--size-px-3) var(--size-px-4);
                        background-color: var(--gray-8);
                        color: var(--gray-1);
                        
                        .example.code {
                            /* border: solid 1px tomato; */
                        }
                        
                    }
                    
                }
                
            }
            
            .section.footer {}
            
        }
    </style>
    <script type="application/json">
        {
            "button": "&lt;button is=\"as-button\"&gt;Does&lt;/button&gt;"
        }
    </script>
    <script>
        const { document: contentDocument } = window;
        
        contentDocument.addEventListener('red:loaded', function execute({ data: { host } }) {
            const { log } = console;
            const { classList } = host;
            
            classList.add('body');
            classList.add('section');
            classList.add('hook');
            log(`@BUTTON EXAMPLE`, host);
            contentDocument.removeEventListener('red:loaded', execute);
        });
    </script>
</body>
