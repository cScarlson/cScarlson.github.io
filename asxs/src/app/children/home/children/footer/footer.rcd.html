
<body>
    <template id="template">
        <h1>Getting Started</h1>
        <p>This framework is not yet published as a package. Stay tuned.</p>
    </template>
    <style id="style">
        * { box-sizing: border-box }
        :host {
            display: block;
            min-height: 200px;
            padding: var(--size-px-5) var(--offset);
            background-color: var(--gray-1);
            color: var(--orange-7);
        }
    </style>
    <script>
        const { parent, frameElement } = window;
        const { customElements, HTMLElement } = parent;
        const { log } = console;
        const TAGNAME = 'home-footer';
        const defined = !!customElements.get(TAGNAME);
        
        if (!defined) customElements.define(TAGNAME, class HomeFooterElement extends HTMLElement {
            
            constructor() {
                super();
                this.attachShadow({ mode: 'open' });
                this.#setup();
            }
            
            #setup() {
                const template = document.querySelector('#template');
                const style = document.querySelector('#style');
                
                this.shadowRoot.appendChild(style);
                this.shadowRoot.appendChild(template.content);
            }
            
            connectedCallback() {
                log(`@HOME FOOTER RCD (Remote Component Definition)...`);
                frameElement.remove();
            }
            
        });
    </script>
</body>
