
<button is="as-button" popovertarget="normalDialogPopoverSizeFullscreen">dialog[is="as-dialog"][popovertarget]</button>
<button is="as-button" command="show-modal" commandfor="normalDialogCommandSizeFullscreen">dialog[is="as-dialog"][command]</button>

<dialog id="normalDialogPopoverSizeFullscreen" class="size fullscreen" is="as-dialog" popover>
    <h1>Fullscreen Popover Style</h1>
    <p>Tantamount to <code>HTMLDialogElement.prototype.show()</code></p>
</dialog>

<dialog id="normalDialogCommandSizeFullscreen" class="size fullscreen" is="as-dialog">
    <h1>Fullscreen Modal Style</h1>
    <p>Tantamount to <code>HTMLDialogElement.prototype.showModal()</code></p>
    <div>
        <button is="as-button" command="close" commandfor="normalDialogCommandSizeFullscreen">Close</button>
    </div>
</dialog>
