
<button is="as-button" popovertarget="queuedDialogPopover">[popovertarget]</button>
<button is="as-button" command="show-modal" commandfor="queuedDialogCommand">[command]</button>
<button class="queued dialog actuator" is="as-button" onclick="window.dispatchEvent( new MessageEvent('as:dialog:request', { type: 'string', content: 'Request Dialog 1' }) )">Request Dialog 1</button>

<dialog id="queuedDialogPopover" is="as-dialog-queue" popover>
    <h1>Queued Dialog</h1>
    <p>Tantamount to <code>HTMLDialogElement.prototype.show()</code></p>
</dialog>

<dialog id="queuedDialogCommand" is="as-dialog-queue" closedby="all">
    <h1>Queued Dialog</h1>
    <form id="queuedDialogCommandForm" method="dialog">
        <p>Tantamount to <code>HTMLDialogElement.prototype.show()</code></p>
    </form>
    <button is="as-button" onclick="this.dispatchEvent( new MessageEvent('as:dialog:close') )">Request Close</button>
    <button is="as-button" type="submit" form="queuedDialogCommandForm">Dismiss All</button>
    <button is="as-button" command="close" commandfor="queuedDialogCommand">Dismiss All</button>
</dialog>
