
<body>
    <template></template>
    <style>
        * { box-sizing: border-box }
        
        dialog[is="as-dialog"], dialog[is="as-dialog-queue"] {
            border: none;
            box-shadow: var(--shadow-3);
            border-radius: var(--radius-2);
            &::backdrop {
                background-color: var(--color-dark);
                opacity: 0.75;
            }
            &.backdrop {
                &.clear {
                    &::backdrop { background-color: transparent }
                }
            }
            &.size {
                &.fullscreen {
                    width: 100vw;
                    height: 100vh;
                    &:not(:modal) {
                        border-radius: unset;
                    }
                }
            }
            &:has(.dialog.body) {
                padding: 0;
                scrollbar-width: thin;
                
                .dialog.header, .dialog.body, .dialog.footer {
                    padding: var(--size-px-3);
                    background-color: inherit;
                }
                
                .dialog.header {
                    position: sticky;
                    top: 0;
                    box-shadow: var(--shadow-2);
                    
                    .header.action.close {
                        position: absolute;
                        top: 0;
                        right: 0;
                        margin: var(--size-px-1);
                        border: none;
                        border-radius: 0;
                        padding: var(--size-px-1) var(--size-px-2);
                        background-color: inherit;
                        font-size: var(--font-size-4);
                        font-weight: var(--font-weight-6);
                        cursor: pointer;
                    }
                    
                }
                
                .dialog.body {}
                
                .dialog.footer {
                    position: sticky;
                    bottom: 0;
                    border-top: solid 1px var(--gray-1);
                    
                    .footer.actionbar {
                        display: flex;
                        justify-content: flex-end;
                        align-items: center;
                        gap: var(--size-px-1);
                        
                        .actionbar.action {}
                        
                    }
                    
                }
                
            }
            
        }
    </style>
    <script>
        const style = document.querySelector('style');
        frameElement.before(style);
    </script>
    <script type="module">
        import { customElement } from '/asxs/v2.0.0/core/element/custom.js';
        import { root } from '/asxs/v2.0.0/core/element/window.js';
        import { Queue } from '/asxs/v2.0.0/core/utilities/patterns/ds/queue.js';
        
        const { frameElement } = window;
        const { HTMLDialogElement, document } = root;
        const { head } = document;
        const DEFAULT_MESSAGE = { type: '' };
        
        customElement('as-dialog-queue', { extends: 'dialog' })
        (class DialogElement extends HTMLDialogElement {
            queue = new Queue();
            
            static init() {
                head.moveBefore(frameElement, null);
                return this;
            }
            
            #show() {
                const { queue } = this;
                const { front: request } = queue;
                const { type, content } = request;
                
                if (type === 'string') this.innerHTML = content;
                else this.#replace(...content);
                super.showModal();
            }
            
            #replace(...nodes) {
                this.innerHTML = '';
                this.append(...nodes);
            }
            
            showModal(message = DEFAULT_MESSAGE) {
                const { queue } = this;
                if (message !== DEFAULT_MESSAGE) queue.enqueue(message);
                this.#show();
            }
            
            #handleCloseRequest(e) {
                const { queue } = this;
                
                queue.dequeue();
                if (!queue.size) this.close();
                else this.#show();
            }
            
            #handleCancel(e) {
                const { queue } = this;
                
                queue.dequeue();
                if (!queue.size) return;
                e.preventDefault();
                this.#show();
            }
            
            #handleClose(e) {
                this.queue.clear();
            }
            
            #handleRequest(e) {
                const { data: message } = e;
                this.showModal(message);
            }
            
            handleEvent(e) {
                if (e.type === 'as:dialog:close') return this.#handleCloseRequest(e);
                if (e.type === 'cancel') return this.#handleCancel(e);
                if (e.type === 'close') return this.#handleClose(e);
                if (e.type === 'as:dialog:request') return this.#handleRequest(e);
            }
            
            connectedCallback() {
                this.addEventListener('as:dialog:close', this, true);
                this.addEventListener('cancel', this, true);
                this.addEventListener('close', this, true);
                this.addEventListener('as:dialog:request', this, true);
            }
            
            disconnectedCallback() {
                this.removeEventListener('as:dialog:close', this, true);
                this.removeEventListener('cancel', this, true);
                this.removeEventListener('close', this, true);
                this.removeEventListener('as:dialog:request', this, true);
            }
            
        }.init());
    </script>
</body>
