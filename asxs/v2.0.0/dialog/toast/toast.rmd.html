
<body>
    <template></template>
    <style>
        * { box-sizing: border-box }

        dialog[is="as-dialog"][modus="toast"], dialog[is="as-dialog-queue"][modus="toast"] {
            top: unset;
            left: unset;
            bottom: 0;
            right: 0;
            aspect-ratio: 16 / 9;
            min-height: 160px;
            margin: var(--font-size-1);
            border-radius: var(--radius-1);
            transition: scale 250ms 0ms ease-in-out;
            transform-origin: bottom right;
            overflow: hidden;
            &:hover {
                scale: 1.25;
            }
            &:modal {
                &::backdrop {
                    cursor: not-allowed;
                }
            }
            &:has(.dialog.body) {
                
                .dialog.header, .dialog.body, .dialog.footer {
                    padding: var(--size-px-1);
                }
                
                .dialog.header {
                    box-shadow: none;
                    border-bottom: solid 1px var(--gray-1);
                    
                    .header.title, .header.subtitle {
                        margin-block: var(--size-px-1);
                    }
                    
                    .header.title {
                        font-size: var(--font-size-3);
                    }
                    
                    .header.subtitle {
                        font-size: var(--font-size-0);
                        filter: brightness(25%);
                    }
                    
                }
                
            }
        }
    </style>
    <script>
        const style = document.querySelector('style');
        frameElement.replaceWith(style);
    </script>
</body>
