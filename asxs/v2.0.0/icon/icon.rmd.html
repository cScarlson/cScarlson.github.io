
<body>
    <template></template>
    <style>
        as-icon {
            --icon: var(--icon-type-placeholder);
            --size: var(--size-px-5);
            --color: black;
            display: inline-block;
            width: var(--size);
            height: var(--size);
            mask-image: var(--icon);
            mask-repeat: no-repeat;
            mask-position: center;
            mask-size: cover;
            background-color: var(--color);
            &.size {
                &.xxs { --size: var(--size-px-3)  }
                &.xs  { --size: var(--size-px-4)  }
                &.sm  { --size: var(--size-px-5)  }
                &.md  { --size: var(--size-px-7)  }
                &.lg  { --size: var(--size-px-8)  }
                &.xl  { --size: var(--size-px-9)  }
                &.xxl { --size: var(--size-px-11) }
            }
        }

        as-icon {
            &:is([type="list"], &[type="menu"], &[type="bars3h"], &[type="hamburger"]) {
                --icon: var(--icon-type-list, var(--icon-type-menu, var(--icon-type-bars3h, var(--icon-type-hamburger))));
            }
        }
    </style>
    <script>
        const style = document.querySelector('style');
        frameElement.replaceWith(style);
    </script>
</body>
