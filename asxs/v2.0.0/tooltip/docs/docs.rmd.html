
<body>
    <template></template>
    <style></style>
    <script type="module">
        import { utilities } from '/asxs/v2.0.0/core/utilities/utilities.js';
        
        const { markdown } = utilities;
        const assets = [
            { id: 'docs', url: './docs.md' },
            { id: 'setup', url: './setup.html' },
            { id: 'example', url: './example.html' },
        ].reduce( get, Promise.resolve({ }) );
        
        async function get(sequence, { id, url }) {
            const resolved = await sequence;
            const response = await fetch(url);
            const text = await response.text();
            
            if (id === 'docs') return { ...resolved, [id]: text.replaceAll(/`/img, '\\`') };
            return { ...resolved, [id]: text.trim() };
        }
        
        (async function execute(promise) {
            const { docs, setup, example } = await promise;
            const interpolated = utilities.interpolate(docs)({ setup, example });
            const markup = markdown.parse(interpolated);
            const template = document.querySelector('template');
            const html = `<at-catalog-tooltips id="/catalog/tooltips" class="catalog docs tooltips router route">${markup}</at-catalog-tooltips>`;
            
            template.innerHTML = html;
            frameElement.replaceWith(template.content);
        })(assets);
        
    </script>
</body>
